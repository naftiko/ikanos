openapi: "3.1.0"
info:
  title: "Petstore 31"
  summary: "A sample pet store API using OAS 3.1 features"
  version: "2.0.0"
servers:
  - url: "https://petstore.swagger.io/v2"
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags:
        - Pets
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type:
              - string
              - "null"
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    tag:
                      type:
                        - string
                        - "null"
                    vaccinated:
                      type: boolean
    post:
      operationId: createPet
      summary: Create a pet
      tags:
        - Pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                tag:
                  type:
                    - string
                    - "null"
      responses:
        "201":
          description: Pet created
  /pets/{petId}:
    get:
      operationId: showPetById
      summary: Info for a specific pet
      tags:
        - Pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  tag:
                    type:
                      - string
                      - "null"
                  owner:
                    type: object
                    properties:
                      name:
                        type: string
                      email:
                        type:
                          - string
                          - "null"
    delete:
      operationId: deletePet
      summary: Delete a pet
      tags:
        - Pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Pet deleted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
