ikanos: 1.0.0-beta3
consumes:
- namespace: registry
  type: http
  # prod: https://mocks.naftiko.net/rest/naftiko-shipyard-maritime-registry-api/1.0.0-alpha2
  baseUri: http://localhost:8080/rest/naftiko-shipyard-maritime-registry-api/1.0.0-alpha2
  authentication:
    type: bearer
    token: '{{REGISTRY_TOKEN}}'
  inputParameters:
    Registry-Version:
      in: header
      value: '{{REGISTRY_VERSION}}'
  resources:
    ships:
      path: /ships
      operations:
        list-ships:
          method: GET
          inputParameters:
            status:
              in: query
    ship:
      path: /ships/{{imo_number}}
      operations:
        get-ship:
          method: GET
          inputParameters:
            imo_number:
              in: path
