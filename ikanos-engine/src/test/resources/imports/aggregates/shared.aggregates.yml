ikanos: "1.0.0-beta3"
aggregates:
  - namespace: "forecast"
    display: "Forecast Domain"
    flows:
      - name: "get-forecast"
        description: "Retrieves weather forecast"
        call: "weather-api.get-forecast"
  - namespace: "geo"
    display: "Geo Domain"
    flows:
      - name: "reverse-geocode"
        description: "Converts coordinates to address"
        call: "geo-api.reverse-geocode"
