ikanos: "1.0.0-beta1"
binds:
  - namespace: "weather-secrets"
    description: "Weather API credentials"
    location: "file://./secrets.env"
    keys:
      WEATHER_API_KEY: "weather-api-key"
  - namespace: "geo-secrets"
    description: "Geo API credentials"
    location: "file://./geo-secrets.env"
    keys:
      GEO_API_KEY: "geo-api-key"
