ikanos: "1.0.0-beta3"
exposes:
  - namespace: "weather-rest"
    type: "rest"
    address: "localhost"
    port: 8080
    resources:
      - path: "/weather"
        operations:
          - name: "get-weather"
            method: "GET"
            description: "Get weather data"
            call: "weather-api.get-forecast"
  - namespace: "weather-mcp"
    type: "mcp"
    address: "localhost"
    port: 3000
    tools:
      - name: "get-weather"
        description: "Get weather data via MCP"
        call: "weather-api.get-forecast"
