ikanos: 1.0.0-alpha3
info:
  label: Aggregate Basic Test
  description: Test capability for aggregate function ref resolution
  tags:
  - Test
  - Aggregate
  created: '2026-04-03'
  modified: '2026-04-03'
capability:
  aggregates:
    forecast:
      label: Forecast
      namespace: forecast
      functions:
        get-forecast:
          description: Fetch current weather forecast for a location.
          semantics:
            safe: true
            idempotent: true
          inputParameters:
            location:
              type: string
              description: City or coordinates
          call: weather-api.get-forecast
          with:
            location: location
          outputParameters:
          - type: string
            mapping: $.forecast
  exposes:
  - type: mcp
    address: localhost
    port: 9100
    namespace: forecast-mcp
    description: MCP server using aggregate ref.
    tools:
      get-forecast:
        description: Get the weather forecast.
        ref: forecast.get-forecast
      get-forecast-inherited:
        ref: forecast.get-forecast
  - type: rest
    address: localhost
    port: 9101
    namespace: forecast-rest
    resources:
      forecast:
        path: /forecast/{location}
        description: Forecast resource
        operations:
          query-forecast:
            ref: forecast.get-forecast
            method: GET
            inputParameters:
              location:
                in: path
                type: string
                description: City or coordinates
          get-forecast:
            ref: forecast.get-forecast
            method: POST
  consumes:
  - type: http
    namespace: weather-api
    baseUri: http://localhost:8080/v1
    resources:
      forecast:
        path: forecast
        operations:
          get-forecast:
            method: GET
