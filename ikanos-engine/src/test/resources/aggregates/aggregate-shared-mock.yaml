# yaml-language-server: $schema=../../../main/resources/schemas/ikanos-schema.json
---
ikanos: "1.0.0-alpha6"
info:
  label: "Aggregate Shared Mock Test"
  description: "Shared aggregate mock function consumed by MCP and REST refs"
  tags:
    - Test
    - Aggregate
  created: "2026-04-09"
  modified: "2026-04-09"

capability:
  aggregates:
    - label: "Greeting"
      namespace: "greeting"
      functions:
        - name: "hello"
          description: "Builds a greeting payload from input parameters."
          inputParameters:
            - name: "name"
              type: "string"
              description: "Name to greet"
          outputParameters:
            - name: "message"
              type: "string"
              value: "Hello, {{name}}!"
            - name: "source"
              type: "string"
              value: "aggregate-mock"

  exposes:
    - type: "mcp"
      address: "localhost"
      port: 9200
      namespace: "greeting-mcp"
      description: "MCP adapter using aggregate ref in mock mode."
      tools:
        - name: "hello"
          description: "Return greeting payload."
          ref: "greeting.hello"

    - type: "rest"
      address: "localhost"
      port: 9201
      namespace: "greeting-rest"
      resources:
        - path: "/hello"
          name: "hello"
          description: "Greeting resource"
          operations:
            - method: "GET"
              name: "hello"
              ref: "greeting.hello"
              inputParameters:
                - name: "name"
                  in: "query"
                  type: "string"
                  description: "Name to greet"
