ikanos: 1.0.0-alpha3
info:
  label: Aggregate Shared Mock Test
  description: Shared aggregate mock function consumed by MCP and REST refs
  tags:
  - Test
  - Aggregate
  created: '2026-04-09'
  modified: '2026-04-09'
capability:
  aggregates:
    greeting:
      label: Greeting
      namespace: greeting
      functions:
        hello:
          description: Builds a greeting payload from input parameters.
          inputParameters:
            name:
              type: string
              description: Name to greet
          outputParameters:
          - name: message
            type: string
            value: Hello, {{name}}!
          - name: source
            type: string
            value: aggregate-mock
  exposes:
  - type: mcp
    address: localhost
    port: 9200
    namespace: greeting-mcp
    description: MCP adapter using aggregate ref in mock mode.
    tools:
      hello:
        description: Return greeting payload.
        ref: greeting.hello
  - type: rest
    address: localhost
    port: 9201
    namespace: greeting-rest
    resources:
      hello:
        path: /hello
        description: Greeting resource
        operations:
          hello:
            method: GET
            ref: greeting.hello
            inputParameters:
              name:
                in: query
                type: string
                description: Name to greet
