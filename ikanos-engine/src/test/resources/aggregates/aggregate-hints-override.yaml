ikanos: 1.0.0-alpha3
info:
  label: Aggregate Hints Override Test
  description: Test capability for semantics-to-hints derivation with override
  tags:
  - Test
  - Aggregate
  created: '2026-04-03'
  modified: '2026-04-03'
capability:
  aggregates:
    data:
      label: Data
      namespace: data
      functions:
        read-items:
          description: Read items from the data store.
          semantics:
            safe: true
            idempotent: true
          call: mock-api.get-items
          outputParameters:
          - type: string
            mapping: $.items
        delete-item:
          description: Delete an item from the data store.
          semantics:
            safe: false
            idempotent: true
          inputParameters:
            item-id:
              type: string
              description: ID of the item to delete
          call: mock-api.delete-item
          with:
            id: item-id
  exposes:
  - type: mcp
    address: localhost
    port: 9102
    namespace: data-mcp
    description: MCP server testing hints derivation with override.
    tools:
      read-items:
        description: Read all items.
        ref: data.read-items
      read-items-open:
        description: Read items with openWorld hint.
        ref: data.read-items
        hints:
          openWorld: true
      delete-item:
        description: Delete an item with explicit hint override.
        ref: data.delete-item
        hints:
          readOnly: false
          destructive: true
          openWorld: false
      plain-tool:
        description: A tool without ref or hints.
        call: mock-api.get-items
  consumes:
  - type: http
    namespace: mock-api
    baseUri: http://localhost:8080/v1
    resources:
      items:
        path: items
        operations:
          get-items:
            method: GET
          delete-item:
            method: DELETE
