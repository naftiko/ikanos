ikanos: 1.0.0-alpha3
capability:
  exposes:
  - type: rest
    address: localhost
    port: 8082
    namespace: test-http
    resources:
      search:
        path: /search
        operations:
          search:
            method: POST
            call: testns.search
            inputParameters:
              userId:
                in: body
                type: string
                description: User ID extracted from request body
                value: $.user.id
  consumes:
  - type: http
    namespace: testns
    baseUri: http://example.com
    inputParameters:
      X-API-Key:
        in: header
        value: ABC123
    resources:
      items:
        path: /items
        operations:
          search:
            method: POST
            inputParameters:
              q:
                in: query
                value: '{{userId}}'
