# yaml-language-server: $schema=../../main/resources/schemas/ikanos-schema.json
---
ikanos: "1.0.0-alpha6"
capability:
  exposes:
    - type: "rest"
      address: "localhost"
      port: 8082
      namespace: "test-http"
      resources:
        - path: "/search"
          operations:
            - method: "POST"
              name: "search"
              call: "testns.search"
              inputParameters:
                - name: "userId"
                  in: "body"
                  type: "string"
                  description: "User ID extracted from request body"
                  value: "$.user.id"
  consumes:
    - type: "http"
      namespace: "testns"
      baseUri: "http://example.com"
      inputParameters:
        - name: "X-API-Key"
          in: "header"
          value: "ABC123"
      resources:
        - path: "/items"
          name: "items"
          operations:
            - method: "POST"
              name: "search"
              inputParameters:
                - name: "q"
                  in: "query"
                  value: "{{userId}}"
