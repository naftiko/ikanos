ikanos: 1.0.0-alpha3
capability:
  exposes:
  - type: rest
    address: localhost
    port: 8084
    namespace: test-http-body
    resources:
      users:
        path: /users
        operations:
          create-user:
            method: POST
            call: testns.create
            inputParameters:
              userId:
                in: body
                type: string
                description: User ID extracted from request body
                value: $.user.id
              userName:
                in: body
                type: string
                description: User name extracted from request body
                value: $.user.name
  consumes:
  - type: http
    namespace: testns
    baseUri: http://example.com
    resources:
      create:
        path: /create
        operations:
          create:
            method: POST
            body: '{"id":"{{userId}}","name":"{{userName}}"}

              '
