ikanos: 1.0.0-alpha3
info:
  label: YAML Test Capability
  description: Test capability for YAML parsing from API responses
  tags:
  - Test
  - YAML
  created: '2026-02-21'
  modified: '2026-02-21'
capability:
  exposes:
  - type: rest
    address: localhost
    port: 9092
    namespace: test-yaml
    resources:
      users:
        path: /yaml/users
        label: YAML Users Resource
        description: Test resource that parses YAML responses
        operations:
          get-users:
            method: GET
            call: mock-yaml.get-users
            outputParameters:
            - type: array
              mapping: $.users
              items:
                type: object
                properties:
                  id:
                    type: string
                    mapping: $.id
                  name:
                    type: string
                    mapping: $.name
                  email:
                    type: string
                    mapping: $.email
  consumes:
  - type: http
    namespace: mock-yaml
    baseUri: http://localhost:8080
    inputParameters:
      User-Agent:
        in: header
        value: Naftiko/1.0.0-2
    resources:
      users:
        path: api/users
        label: Mock Users API
        operations:
          get-users:
            method: GET
            label: Get Users
            outputRawFormat: yaml
