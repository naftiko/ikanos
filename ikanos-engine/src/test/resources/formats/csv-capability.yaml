ikanos: 1.0.0-alpha4
info:
  display: CSV Test Capability
  description: Test capability for CSV parsing from API responses
  tags:
  - Test
  - CSV
  created: '2026-02-21'
  modified: '2026-02-21'
capability:
  exposes:
  - type: rest
    address: localhost
    port: 9092
    namespace: test-csv
    resources:
      users:
        path: /csv/users
        display: CSV Users Resource
        description: Test resource that parses CSV responses
        operations:
          get-users:
            method: GET
            call: mock-csv.get-users
            outputParameters:
            - type: array
              mapping: $
              items:
                type: object
                properties:
                  id:
                    type: string
                    mapping: $.id
                  name:
                    type: string
                    mapping: $.name
                  email:
                    type: string
                    mapping: $.email
  consumes:
  - type: http
    namespace: mock-csv
    baseUri: http://localhost:8080
    inputParameters:
      User-Agent:
        in: header
        value: Naftiko/1.0.0-alpha2
    resources:
      users:
        path: api/users
        display: Mock Users API
        operations:
          get-users:
            method: GET
            display: Get Users
            outputRawFormat: csv
