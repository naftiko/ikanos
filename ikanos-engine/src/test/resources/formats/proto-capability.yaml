ikanos: 1.0.0-beta2
info:
  display: Protobuf Test Capability
  description: Test capability for Protobuf message decoding from API responses
  tags:
  - Test
  - Protobuf
  created: '2026-02-21'
  modified: '2026-02-21'
capability:
  exposes:
  - type: rest
    address: localhost
    port: 9092
    namespace: test-protobuf
    resources:
      records:
        path: /proto/records
        display: Protobuf Records Resource
        description: Test resource that parses Protobuf messages
        operations:
          get-records:
            method: GET
            call: mock-proto.get-records
            outputParameters:
            - type: array
              mapping: $.records
              items:
                type: object
                properties:
                  id:
                    type: string
                    mapping: $.id
                  title:
                    type: string
                    mapping: $.title
                  description:
                    type: string
                    mapping: $.description
  consumes:
  - type: http
    namespace: mock-proto
    baseUri: http://localhost:8080
    inputParameters:
      Accept:
        in: header
        value: application/protobuf
    resources:
      records:
        path: api/records
        display: Mock Records API
        operations:
          get-records:
            method: GET
            display: Get Records
            outputRawFormat: protobuf
