ikanos: "1.0.0-alpha3"
info:
  label: "Markdown Test Capability"
  description: "Test capability for Markdown parsing"
  tags:
  - Test
  - Markdown
  created: "2026-04-02"
  modified: "2026-04-02"

capability:
  exposes:
  - type: "rest"
    address: "localhost"
    port: 9094
    namespace: "test-markdown"
    resources:
      "features":
        path: "/markdown/features"
        operations:
          get-readme:
            method: "GET"
            call: "mock-markdown.get-readme"
            outputParameters:
            - type: "array"
              mapping: "$.tables[0]"
              items:
                type: "object"
                properties:
                  feature:
                    type: "string"
                    mapping: "$.Feature"
                  status:
                    type: "string"
                    mapping: "$.Status"

  consumes:
  - type: "http"
    namespace: "mock-markdown"
    baseUri: "http://localhost:8080"
    resources:
      "readme":
        path: "/api/readme"
        operations:
          "get-readme":
            method: "GET"
            outputRawFormat: "markdown"

