ikanos: 1.0.0-alpha3
info:
  label: Embedding Test
  description: Test capability for step handler registry integration
  tags:
  - Test
  - Embedding
  created: '2026-05-01'
  modified: '2026-05-01'
capability:
  exposes:
  - type: mcp
    address: localhost
    port: 9199
    namespace: embed-test
    description: Test MCP server for embedding API validation.
    tools:
      greet:
        description: Greet by name
        inputParameters:
          name:
            type: string
            description: Name to greet
            required: true
        steps:
          do-greet:
            type: call
            call: placeholder.greet
            with:
              name: '{{name}}'
        outputParameters:
        - name: message
          type: string
        mappings:
        - targetName: message
          value: $.do-greet.message
      compute:
        description: Compute two numbers
        inputParameters:
          a:
            type: number
            description: First number
            required: true
          b:
            type: number
            description: Second number
            required: true
        steps:
          add:
            type: call
            call: placeholder.add
            with:
              a: '{{a}}'
              b: '{{b}}'
        outputParameters:
        - name: result
          type: number
        mappings:
        - targetName: result
          value: $.add.result
  consumes:
  - type: http
    namespace: placeholder
    baseUri: http://localhost:19999
    resources:
      greet:
        path: greet
        operations:
          greet:
            method: POST
      add:
        path: add
        operations:
          add:
            method: POST
