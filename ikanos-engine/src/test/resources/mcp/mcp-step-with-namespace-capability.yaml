ikanos: 1.0.0-alpha3
capability:
  consumes:
  - namespace: registry
    type: http
    baseUri: http://localhost:19999
    resources:
      voyage:
        path: /voyages/{{voyageId}}
        operations:
          get-voyage:
            method: GET
            inputParameters:
              voyageId:
                in: path
  exposes:
  - type: mcp
    port: 13002
    namespace: shipyard-tools
    description: Test MCP tools for step-level namespace resolution
    tools:
      get-voyage-manifest:
        description: Assemble a voyage manifest
        inputParameters:
          voyageId:
            type: string
            description: Voyage ID
            required: true
        steps:
          get-voyage:
            type: call
            call: registry.get-voyage
            with:
              voyageId: shipyard-tools.voyageId
        mappings:
        - targetName: voyageId
          value: $.get-voyage.voyageId
        outputParameters:
        - name: voyageId
          type: string
