ikanos: 1.0.0-alpha3
capability:
  consumes:
  - namespace: registry
    type: http
    baseUri: http://localhost:19999
    resources:
      ship:
        path: /ships/{{imo_number}}
        operations:
          get-ship:
            method: GET
            inputParameters:
              imo_number:
                in: path
  exposes:
  - type: mcp
    port: 13001
    namespace: shipyard-tools
    description: Test MCP tools for ToolHandler regression tests
    tools:
      get-ship:
        description: Get a ship by IMO number
        inputParameters:
          imo:
            type: string
            description: IMO number of the ship
            required: true
        call: registry.get-ship
        with:
          imo_number: '{{imo}}'
