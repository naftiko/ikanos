---
naftiko: "1.0.0-alpha1"

binds:
  - namespace: "registry-env"
    description: "Maritime Registry API credentials and config."
    location: "file:///./secrets.yaml"
    keys:
      REGISTRY_TOKEN: "registry-bearer-token"
      REGISTRY_VERSION: "registry-api-version"
  - namespace: "dockyard-env"
    description: "Legacy Dockyard API credentials."
    location: "file:///./secrets.yaml"
    keys:
      DOCKYARD_API_KEY: "dockyard-api-key"
  - namespace: "otel-env"
    description: "OpenTelemetry exporter configuration."
    location: "file:///./secrets.yaml"
    keys:
      OTEL_ENDPOINT: "otel-collector-endpoint"

capability:
  exposes:
    - type: control
      address: localhost
      port: 9090
      management:
        health: true
      observability:
        enabled: true
        metrics:
          local:
            enabled: true
        traces:
          sampling: 1.0
          propagation: w3c
          local:
            enabled: true
            buffer-size: 200
        exporters:
          otlp:
            endpoint: "{{OTEL_ENDPOINT}}"

    - type: mcp
      port: 3001
      namespace: shipyard-tools
      description: "Shipyard MCP tools for fleet management"
      tools:
        - name: list-ships
          description: "List ships in the shipyard, optionally filtered by status"
          inputParameters:
            - name: status
              type: string
              required: false
              description: "Filter by operational status"
          call: registry.list-ships
          with:
            status: shipyard-tools.status
          outputParameters:
            - type: array
              mapping: "$."
              items:
                type: object
                properties:
                    imo:
                      type: string
                      mapping: "$.imo_number"
                    name:
                      type: string
                      mapping: "$.vessel_name"
                    type:
                      type: string
                      mapping: "$.vessel_type"
                    flag:
                      type: string
                      mapping: "$.flag_code"
                    status:
                      type: string
                      mapping: "$.operational_status"
        - name: get-ship
          description: "Retrieve a ship's details by IMO number"
          inputParameters:
            - name: imo
              type: string
              required: true
              description: "IMO number of the ship"
          call: registry.get-ship
          with:
            imo_number: shipyard-tools.imo
          outputParameters:
            - type: object
              properties:
                imo:
                  type: string
                  mapping: "$.imo_number"
                name:
                  type: string
                  mapping: "$.vessel_name"
                type:
                  type: string
                  mapping: "$.vessel_type"
                flag:
                  type: string
                  mapping: "$.flag_code"
                status:
                  type: string
                  mapping: "$.operational_status"
                specs:
                  type: object
                  properties:
                    yearBuilt:
                      type: number
                      mapping: "$.year_built"
                    tonnage:
                      type: number
                      mapping: "$.gross_tonnage"
                    length:
                      type: number
                      mapping: "$.dimensions.length_overall"
        - name: list-legacy-vessels
          description: "List vessels from the legacy Dockyard, optionally filtered by status"
          inputParameters:
            - name: status
              type: string
              required: false
              description: "Filter by operational status (active, laid_up, scrapped)"
          call: legacy.list-vessels
          with:
            status: shipyard-tools.status
          outputParameters:
            - type: array
              mapping: "$."
              items:
                type: object
                properties:
                    vesselCode:
                      type: string
                      mapping: "$.vesselCode"
                    name:
                      type: string
                      mapping: "$.vesselName"
                    type:
                      type: string
                      mapping: "$.category"
                    flag:
                      type: string
                      mapping: "$.flagState"
                    status:
                      type: string
                      mapping: "$.operationalStatus"
        - name: create-voyage
          description: "Plan a new voyage with ship, crew, route, and dates"
          inputParameters:
            - name: shipImo
              type: string
              required: true
              description: "IMO number of the ship"
            - name: departurePort
              type: string
              required: true
              description: "Port of departure"
            - name: arrivalPort
              type: string
              required: true
              description: "Port of arrival"
            - name: departureDate
              type: string
              required: true
              description: "Departure date (ISO-8601)"
            - name: arrivalDate
              type: string
              required: true
              description: "Arrival date (ISO-8601)"
            - name: crewIds
              type: array
              required: true
              description: "List of crew member IDs"
            - name: cargoIds
              type: array
              required: false
              description: "List of cargo item IDs (optional)"
          call: registry.create-voyage
          with:
            shipImo: shipyard-tools.shipImo
            departurePort: shipyard-tools.departurePort
            arrivalPort: shipyard-tools.arrivalPort
            departureDate: shipyard-tools.departureDate
            arrivalDate: shipyard-tools.arrivalDate
            crewIds: shipyard-tools.crewIds
            cargoIds: shipyard-tools.cargoIds
          outputParameters:
            - type: object
              properties:
                voyageId:
                  type: string
                  mapping: "$.voyageId"
                shipImo:
                  type: string
                  mapping: "$.shipImo"
                route:
                  type: object
                  properties:
                    from:
                      type: string
                      mapping: "$.departurePort"
                    to:
                      type: string
                      mapping: "$.arrivalPort"
                dates:
                  type: object
                  properties:
                    departure:
                      type: string
                      mapping: "$.departureDate"
                    arrival:
                      type: string
                      mapping: "$.arrivalDate"
                crewIds:
                  type: array
                  mapping: "$.crewIds"
                  items:
                    type: string
                    mapping: "$."
                cargoIds:
                  type: array
                  mapping: "$.cargoIds"
                  items:
                    type: string
                    mapping: "$."
                status:
                  type: string
                  mapping: "$.status"
        - name: get-ship-with-crew
          description: "Get ship details with resolved crew names"
          inputParameters:
            - name: imo
              type: string
              required: true
              description: "IMO number of the ship"
          steps:
            - name: get-ship
              type: call
              call: registry.get-ship
              with:
                imo_number: shipyard-tools.imo
            - name: list-crew
              type: call
              call: registry.list-crew
            - name: resolve-crew
              type: lookup
              index: list-crew
              match: crewId
              lookupValue: "$.get-ship.assignedCrew"
              outputParameters:
                - "fullName"
                - "role"
          mappings:
            - targetName: imo
              value: "$.get-ship.imo_number"
            - targetName: name
              value: "$.get-ship.vessel_name"
            - targetName: type
              value: "$.get-ship.vessel_type"
            - targetName: flag
              value: "$.get-ship.flag_code"
            - targetName: status
              value: "$.get-ship.operational_status"
            - targetName: yearBuilt
              value: "$.get-ship.year_built"
            - targetName: tonnage
              value: "$.get-ship.gross_tonnage"
            - targetName: length
              value: "$.get-ship.dimensions.length_overall"
            - targetName: crew
              value: "$.resolve-crew"
          outputParameters:
            - name: imo
              type: string
            - name: name
              type: string
            - name: type
              type: string
            - name: flag
              type: string
            - name: status
              type: string
            - name: yearBuilt
              type: number
            - name: tonnage
              type: number
            - name: length
              type: number
            - name: crew
              type: array
              items:
                - name: fullName
                  type: string
                - name: role
                  type: string

    - type: skill
      address: localhost
      port: 3003
      namespace: shipyard-skills
      description: "Shipyard skill groups for structured agent discovery"
      skills:
        - name: fleet-ops
          description: "Fleet management — list, search, and inspect ships across all registries"
          tools:
            - name: list-ships
              description: "List ships in the shipyard, optionally filtered by status"
              from:
                sourceNamespace: shipyard-tools
                action: list-ships
            - name: get-ship
              description: "Retrieve a ship's details by IMO number"
              from:
                sourceNamespace: shipyard-tools
                action: get-ship
            - name: list-legacy-vessels
              description: "List vessels from the legacy Dockyard"
              from:
                sourceNamespace: shipyard-tools
                action: list-legacy-vessels
            - name: get-ship-with-crew
              description: "Get ship details with resolved crew names"
              from:
                sourceNamespace: shipyard-tools
                action: get-ship-with-crew
        - name: voyage-ops
          description: "Voyage planning — create and manage voyages"
          tools:
            - name: create-voyage
              description: "Plan a new voyage with ship, crew, route, and dates"
              from:
                sourceNamespace: shipyard-tools
                action: create-voyage

    - type: rest
      port: 3002
      namespace: shipyard-api
      resources:
        - name: ships
          path: "/ships"
          description: "Fleet listing — query all ships from the modern registry, with optional status filtering."
          operations:
            - name: list-ships
              method: GET
              inputParameters:
                - name: status
                  in: query
                  type: string
                  description: "Filter by operational status"
              call: registry.list-ships
              with:
                status: shipyard-api.status
              outputParameters:
                - type: array
                  mapping: "$."
                  items:
                    type: object
                    properties:
                        imo:
                          type: string
                          mapping: "$.imo_number"
                        name:
                          type: string
                          mapping: "$.vessel_name"
                        type:
                          type: string
                          mapping: "$.vessel_type"
                        flag:
                          type: string
                          mapping: "$.flag_code"
                        status:
                          type: string
                          mapping: "$.operational_status"
        - name: ship-by-imo
          path: "/ships/{imo}"
          description: "Ship details — retrieve a single ship's identity, status, and technical specifications by IMO number."
          operations:
            - name: get-ship
              method: GET
              inputParameters:
                - name: imo
                  in: path
                  type: string
                  description: "IMO number of the ship"
              call: registry.get-ship
              with:
                imo_number: shipyard-api.imo
              outputParameters:
                - type: object
                  properties:
                    imo:
                      type: string
                      mapping: "$.imo_number"
                    name:
                      type: string
                      mapping: "$.vessel_name"
                    type:
                      type: string
                      mapping: "$.vessel_type"
                    flag:
                      type: string
                      mapping: "$.flag_code"
                    status:
                      type: string
                      mapping: "$.operational_status"
                    specs:
                      type: object
                      properties:
                        yearBuilt:
                          type: number
                          mapping: "$.year_built"
                        tonnage:
                          type: number
                          mapping: "$.gross_tonnage"
                        length:
                          type: number
                          mapping: "$.dimensions.length_overall"
        - name: ship-crew
          path: "/ships/{imo}/crew"
          description: "Ship with crew — retrieve ship details enriched with resolved crew names and roles."
          operations:
            - name: get-ship-with-crew
              method: GET
              inputParameters:
                - name: imo
                  in: path
                  type: string
                  description: "IMO number of the ship"
              steps:
                - name: get-ship
                  type: call
                  call: registry.get-ship
                  with:
                    imo_number: shipyard-api.imo
                - name: list-crew
                  type: call
                  call: registry.list-crew
                - name: resolve-crew
                  type: lookup
                  index: list-crew
                  match: crewId
                  lookupValue: "$.get-ship.assignedCrew"
                  outputParameters:
                    - "fullName"
                    - "role"
              mappings:
                - targetName: imo
                  value: "$.get-ship.imo_number"
                - targetName: name
                  value: "$.get-ship.vessel_name"
                - targetName: type
                  value: "$.get-ship.vessel_type"
                - targetName: flag
                  value: "$.get-ship.flag_code"
                - targetName: status
                  value: "$.get-ship.operational_status"
                - targetName: yearBuilt
                  value: "$.get-ship.year_built"
                - targetName: tonnage
                  value: "$.get-ship.gross_tonnage"
                - targetName: length
                  value: "$.get-ship.dimensions.length_overall"
                - targetName: crew
                  value: "$.resolve-crew"
              outputParameters:
                - name: imo
                  type: string
                - name: name
                  type: string
                - name: type
                  type: string
                - name: flag
                  type: string
                - name: status
                  type: string
                - name: yearBuilt
                  type: number
                - name: tonnage
                  type: number
                - name: length
                  type: number
                - name: crew
                  type: array
                  items:
                    - name: fullName
                      type: string
                    - name: role
                      type: string
        - name: legacy-vessels
          path: "/legacy/vessels"
          description: "Legacy fleet listing — query vessels from the legacy Dockyard, with optional status filtering."
          operations:
            - name: list-legacy-vessels
              method: GET
              inputParameters:
                - name: status
                  in: query
                  type: string
                  description: "Filter by operational status"
              call: legacy.list-vessels
              with:
                status: shipyard-api.status
              outputParameters:
                - type: array
                  mapping: "$."
                  items:
                    type: object
                    properties:
                        vesselCode:
                          type: string
                          mapping: "$.vesselCode"
                        name:
                          type: string
                          mapping: "$.vesselName"
                        type:
                          type: string
                          mapping: "$.category"
                        flag:
                          type: string
                          mapping: "$.flagState"
                        status:
                          type: string
                          mapping: "$.operationalStatus"
        - name: voyages
          path: "/voyages"
          description: "Voyage planning — create new voyages with ship, crew, route, and schedule."
          operations:
            - name: create-voyage
              method: POST
              inputParameters:
                - name: shipImo
                  in: body
                  type: string
                  description: "IMO number of the ship"
                - name: departurePort
                  in: body
                  type: string
                  description: "Port of departure"
                - name: arrivalPort
                  in: body
                  type: string
                  description: "Port of arrival"
                - name: departureDate
                  in: body
                  type: string
                  description: "Departure date (ISO-8601)"
                - name: arrivalDate
                  in: body
                  type: string
                  description: "Arrival date (ISO-8601)"
                - name: crewIds
                  in: body
                  type: array
                  description: "List of crew member IDs"
                - name: cargoIds
                  in: body
                  type: array
                  description: "List of cargo item IDs (optional)"
              call: registry.create-voyage
              with:
                shipImo: shipyard-api.shipImo
                departurePort: shipyard-api.departurePort
                arrivalPort: shipyard-api.arrivalPort
                departureDate: shipyard-api.departureDate
                arrivalDate: shipyard-api.arrivalDate
                crewIds: shipyard-api.crewIds
                cargoIds: shipyard-api.cargoIds
              outputParameters:
                - type: object
                  properties:
                    voyageId:
                      type: string
                      mapping: "$.voyageId"
                    shipImo:
                      type: string
                      mapping: "$.shipImo"
                    route:
                      type: object
                      properties:
                        from:
                          type: string
                          mapping: "$.departurePort"
                        to:
                          type: string
                          mapping: "$.arrivalPort"
                    dates:
                      type: object
                      properties:
                        departure:
                          type: string
                          mapping: "$.departureDate"
                        arrival:
                          type: string
                          mapping: "$.arrivalDate"
                    crewIds:
                      type: array
                      mapping: "$.crewIds"
                      items:
                        type: string
                        mapping: "$."
                    cargoIds:
                      type: array
                      mapping: "$.cargoIds"
                      items:
                        type: string
                        mapping: "$."
                    status:
                      type: string
                      mapping: "$.status"

  consumes:
    - namespace: registry
      type: http
      description: "Maritime Registry API — provides ship records, voyage planning, crew assignments, and cargo tracking for the Shipyard fleet."
      baseUri: "https://registry.shipyard.dev/api/v1"
      authentication:
        type: bearer
        token: "REGISTRY_TOKEN"
      inputParameters:
      - name: Registry-Version
        in: header
        value: "REGISTRY_VERSION"
      resources:
        - name: ships
          path: "/ships"
          operations:
            - name: list-ships
              method: GET
              inputParameters:
                - name: status
                  in: query
        - name: ship
          path: "/ships/{{imo_number}}"
          operations:
            - name: get-ship
              method: GET
              inputParameters:
                - name: imo_number
                  in: path
        - name: voyages
          path: "/voyages"
          operations:
            - name: create-voyage
              method: POST
              body: |
                {
                  "shipImo": "{{shipImo}}",
                  "departurePort": "{{departurePort}}",
                  "arrivalPort": "{{arrivalPort}}",
                  "departureDate": "{{departureDate}}",
                  "arrivalDate": "{{arrivalDate}}",
                  "crewIds": {{crewIds}},
                  "cargoIds": {{cargoIds}}
                }
        - name: voyage
          path: "/voyages/{{voyageId}}"
          operations:
            - name: get-voyage
              method: GET
              inputParameters:
                - name: voyageId
                  in: path
        - name: crew
          path: "/crew"
          operations:
            - name: list-crew
              method: GET
        - name: cargo
          path: "/cargo"
          operations:
            - name: list-cargo
              method: GET
    - namespace: legacy
      type: http
      description: "Legacy Dockyard API — read-only access to older vessel records not yet migrated to the modern registry"
      baseUri: "https://legacy.dockyard.dev/api"
      authentication:
        type: apikey
        key: X-Dock-Key
        value: "DOCKYARD_API_KEY"
      resources:
        - name: vessels
          path: "/vessels"
          operations:
            - name: list-vessels
              method: GET
              inputParameters:
                - name: status
                  in: query
