ikanos: "1.0.0-alpha3"

binds:
- namespace: "registry-env"
  description: "Maritime Registry API credentials and config."
  location: "file:///./shared/secrets.yaml"
  keys:
    REGISTRY_TOKEN: "registry-bearer-token"
    REGISTRY_VERSION: "registry-api-version"
    MCP_SERVER_TOKEN: "mcp-server-token"
- namespace: "dockyard-env"
  description: "Legacy Dockyard API credentials."
  location: "file:///./shared/secrets.yaml"
  keys:
    DOCKYARD_API_KEY: "dockyard-api-key"

capability:
  consumes:
  - import: registry
    location: ./shared/step6-registry-consumes.yaml
  - import: legacy
    location: ./shared/legacy-consumes.yaml

  exposes:
  - type: mcp
    address: "0.0.0.0"   # Needed in Docker context. Permits to access the MCP with localhost from outside the container.
    port: 3001
    namespace: shipyard-tools
    authentication:
      type: bearer
      token: "{{MCP_SERVER_TOKEN}}"
    description: "Shipyard MCP tools for fleet management"
    tools:
      list-ships:
        description: "List ships in the shipyard, optionally filtered by status"
        inputParameters:
          status:
            type: string
            required: false
            description: "Filter by operational status"
        call: registry.list-ships
        with:
          status: shipyard-tools.status
        outputParameters:
        - type: array
          mapping: "$."
          items:
            type: object
            properties:
              imo:
                type: string
                mapping: "$.imo_number"
              name:
                type: string
                mapping: "$.vessel_name"
              type:
                type: string
                mapping: "$.vessel_type"
              flag:
                type: string
                mapping: "$.flag_code"
              status:
                type: string
                mapping: "$.operational_status"
      get-ship:
        description: "Retrieve a ship's details by IMO number"
        inputParameters:
          imo:
            type: string
            required: true
            description: "IMO number of the ship"
        call: registry.get-ship
        with:
          imo_number: shipyard-tools.imo
        outputParameters:
        - type: object
          properties:
            imo:
              type: string
              mapping: "$.imo_number"
            name:
              type: string
              mapping: "$.vessel_name"
            type:
              type: string
              mapping: "$.vessel_type"
            flag:
              type: string
              mapping: "$.flag_code"
            status:
              type: string
              mapping: "$.operational_status"
            specs:
              type: object
              properties:
                yearBuilt:
                  type: number
                  mapping: "$.year_built"
                tonnage:
                  type: number
                  mapping: "$.gross_tonnage"
                length:
                  type: number
                  mapping: "$.dimensions.length_overall"
      list-legacy-vessels:
        description: "List vessels from the legacy Dockyard, optionally filtered by status"
        inputParameters:
          status:
            type: string
            required: false
            description: "Filter by operational status (active, laid_up, scrapped)"
        call: legacy.list-vessels
        with:
          status: shipyard-tools.status
        outputParameters:
        - type: array
          mapping: "$.vessel"
          items:
            type: object
            properties:
              vesselCode:
                type: string
                mapping: "$.vesselCode"
              name:
                type: string
                mapping: "$.vesselName"
              type:
                type: string
                mapping: "$.category"
              flag:
                type: string
                mapping: "$.flagState"
              status:
                type: string
                mapping: "$.operationalStatus"
      create-voyage:
        description: "Plan a new voyage with ship, crew, route, and dates"
        inputParameters:
          shipImo:
            type: string
            required: true
            description: "IMO number of the ship"
          departurePort:
            type: string
            required: true
            description: "Port of departure"
          arrivalPort:
            type: string
            required: true
            description: "Port of arrival"
          departureDate:
            type: string
            required: true
            description: "Departure date (ISO-8601)"
          arrivalDate:
            type: string
            required: true
            description: "Arrival date (ISO-8601)"
          crewIds:
            type: array
            required: true
            description: "List of crew member IDs"
          cargoIds:
            type: array
            required: false
            description: "List of cargo item IDs (optional)"
        call: registry.create-voyage
        hints:
          readOnly: false
          destructive: false
          idempotent: false
          openWorld: true
        outputParameters:
        - type: object
          properties:
            voyageId:
              type: string
              mapping: "$.voyageId"
            shipImo:
              type: string
              mapping: "$.shipImo"
            route:
              type: object
              properties:
                from:
                  type: string
                  mapping: "$.departurePort"
                to:
                  type: string
                  mapping: "$.arrivalPort"
            dates:
              type: object
              properties:
                departure:
                  type: string
                  mapping: "$.departureDate"
                arrival:
                  type: string
                  mapping: "$.arrivalDate"
            crewIds:
              type: array
              mapping: "$.crewIds"
              items:
                type: string
                mapping: "$."
            cargoIds:
              type: array
              mapping: "$.cargoIds"
              items:
                type: string
                mapping: "$."
            status:
              type: string
              mapping: "$.status"


