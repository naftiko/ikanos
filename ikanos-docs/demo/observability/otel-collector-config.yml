# yaml-language-server: $schema=https://json.schemastore.org/base.json
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # Prometheus exporter — Prometheus scrapes the collector on :8889/metrics
  prometheus:
    endpoint: 0.0.0.0:8889

  # OTLP exporter — forwards traces + metrics to Datadog Agent (or any OTLP backend)
  otlp/datadog:
    endpoint: "datadog-agent:4317"
    tls:
      insecure: true

  # Debug exporter — logs telemetry to stdout for local development
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp/datadog]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
