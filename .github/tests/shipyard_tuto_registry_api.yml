openapi: 3.1.0
info:
  title: naftiko-shipyard-maritime-registry-api
  description: >-
    Maritime ship registry API providing fleet management operations including
    ship lookup, voyage planning, crew management, and cargo tracking.
    Requires bearer token authentication for full data access.
  version: 1.0.0-alpha1
  contact:
    name: Shipyard API Team

servers:
  - url: https://mocks.naftiko.net/rest/naftiko-shipyard-maritime-registry-api/1.0.0-alpha1
    description: Maritime Registry API

tags:
  - name: Ships
    description: Ship registry operations for listing and retrieving vessel details
  - name: Voyages
    description: Voyage planning and management operations
  - name: Crew
    description: Crew member registry operations
  - name: Cargo
    description: Cargo item registry operations

security:
  - bearerAuth: []

paths:
  /ships:
    get:
      tags:
        - Ships
      operationId: list-ships
      summary: List ships in the registry
      description: >-
        Returns a list of ships in the maritime registry. Without authentication,
        returns basic summaries (5 fields). With bearer token authentication,
        returns full ship details including specs, dimensions, certifications,
        and crew assignments.
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: |-
          {
            "dispatcher": "URI_PARAMS",
            "dispatcherRules": "status",
            "fallback": "allShips"
          }
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by operational status
          schema:
            type: string
            enum:
              - active
              - maintenance
              - decommissioned
          examples:
            "?status=active":
              value: "active"
            "?status=maintenance":
              value: "maintenance"
        - $ref: '#/components/parameters/RegistryVersion'
      responses:
        '200':
          description: A list of ships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShipSummary'
              examples:
                allShips:
                  summary: All ships in the registry
                  value:
                    - imo_number: "IMO-9321483"
                      vessel_name: "Northern Star"
                      vessel_type: "cargo"
                      flag_code: "NO"
                      operational_status: "active"
                    - imo_number: "IMO-9456781"
                      vessel_name: "Pacific Dawn"
                      vessel_type: "tanker"
                      flag_code: "SG"
                      operational_status: "maintenance"
                "?status=active":
                  summary: Ships filtered by active status
                  value:
                    - imo_number: "IMO-9321483"
                      vessel_name: "Northern Star"
                      vessel_type: "cargo"
                      flag_code: "NO"
                      operational_status: "active"
                "?status=maintenance":
                  summary: Ships filtered by maintenance status
                  value:
                    - imo_number: "IMO-9456781"
                      vessel_name: "Pacific Dawn"
                      vessel_type: "tanker"
                      flag_code: "SG"
                      operational_status: "maintenance"

  /ships/{imo_number}:
    get:
      tags:
        - Ships
      operationId: get-ship
      summary: Retrieve a ship's details by IMO number
      description: >-
        Returns full ship details for the given IMO number. With bearer token
        authentication, the response includes 30+ fields covering specs,
        dimensions, certifications, and assigned crew IDs.
      x-microcks-operation:
        dispatcher: URI_PARTS
        dispatcherRules: imo_number
      parameters:
        - name: imo_number
          in: path
          required: true
          description: IMO number of the ship
          schema:
            type: string
          examples:
            "/imo_number=IMO-9321483":
              value: "IMO-9321483"
            "/imo_number=IMO-9456781":
              value: "IMO-9456781"
        - $ref: '#/components/parameters/RegistryVersion'
      responses:
        '200':
          description: Full ship details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipDetail'
              examples:
                "/imo_number=IMO-9321483":
                  summary: Northern Star - cargo vessel
                  value:
                    imo_number: "IMO-9321483"
                    vessel_name: "Northern Star"
                    vessel_type: "cargo"
                    flag_code: "NO"
                    operational_status: "active"
                    year_built: 2015
                    gross_tonnage: 42000
                    dimensions:
                      length_overall: 229
                      beam: 32
                      draft: 12.5
                    assignedCrew:
                      - "CREW-001"
                      - "CREW-003"
                "/imo_number=IMO-9456781":
                  summary: Pacific Dawn - tanker vessel
                  value:
                    imo_number: "IMO-9456781"
                    vessel_name: "Pacific Dawn"
                    vessel_type: "tanker"
                    flag_code: "SG"
                    operational_status: "maintenance"
                    year_built: 2018
                    gross_tonnage: 55000
                    dimensions:
                      length_overall: 274
                      beam: 48
                      draft: 16.0
                    assignedCrew:
                      - "CREW-002"
                      - "CREW-004"
        '404':
          description: Ship not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                    error: "not_found"
                    message: "Ship with IMO number IMO-0000000 not found"

  /voyages:
    post:
      tags:
        - Voyages
      operationId: create-voyage
      summary: Plan a new voyage
      description: >-
        Creates a new voyage with the specified ship, crew, route, and dates.
        The voyage is initially created with status "planned".
      parameters:
        - $ref: '#/components/parameters/RegistryVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVoyageRequest'
            examples:
              osloToSingapore:
                summary: Oslo to Singapore voyage
                value:
                  shipImo: "IMO-9321483"
                  departurePort: "Oslo"
                  arrivalPort: "Singapore"
                  departureDate: "2026-04-10"
                  arrivalDate: "2026-05-02"
                  crewIds:
                    - "CREW-001"
                    - "CREW-003"
                  cargoIds:
                    - "CARGO-2024-0451"
      responses:
        '201':
          description: Voyage created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voyage'
              examples:
                created:
                  summary: Newly created voyage
                  value:
                    voyageId: "VOY-2026-042"
                    shipImo: "IMO-9321483"
                    departurePort: "Oslo"
                    arrivalPort: "Singapore"
                    departureDate: "2026-04-10"
                    arrivalDate: "2026-05-02"
                    crewIds:
                      - "CREW-001"
                      - "CREW-003"
                    cargoIds:
                      - "CARGO-2024-0451"
                    status: "planned"
        '400':
          description: Invalid voyage request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidShip:
                  value:
                    error: "bad_request"
                    message: "Ship IMO-0000000 not found or not available"

  /voyages/{voyageId}:
    get:
      tags:
        - Voyages
      operationId: get-voyage
      summary: Retrieve a voyage by ID
      description: >-
        Returns the full voyage details including ship assignment, crew IDs,
        cargo IDs, route, dates, and status.
      x-microcks-operation:
        dispatcher: URI_PARTS
        dispatcherRules: voyageId
      parameters:
        - name: voyageId
          in: path
          required: true
          description: Voyage identifier
          schema:
            type: string
          examples:
            "/voyageId=VOY-2026-042":
              value: "VOY-2026-042"
        - $ref: '#/components/parameters/RegistryVersion'
      responses:
        '200':
          description: Voyage details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voyage'
              examples:
                "/voyageId=VOY-2026-042":
                  summary: Oslo to Singapore voyage
                  value:
                    voyageId: "VOY-2026-042"
                    shipImo: "IMO-9321483"
                    departurePort: "Oslo"
                    arrivalPort: "Singapore"
                    departureDate: "2026-04-10"
                    arrivalDate: "2026-05-02"
                    crewIds:
                      - "CREW-001"
                      - "CREW-003"
                    cargoIds:
                      - "CARGO-2024-0451"
                    status: "planned"
        '404':
          description: Voyage not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notFound:
                  value:
                    error: "not_found"
                    message: "Voyage VOY-0000-000 not found"

  /crew:
    get:
      tags:
        - Crew
      operationId: list-crew
      summary: List all crew members
      description: >-
        Returns a list of all registered crew members with their roles
        and certifications.
      parameters:
        - $ref: '#/components/parameters/RegistryVersion'
      responses:
        '200':
          description: A list of crew members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CrewMember'
              examples:
                allCrew:
                  summary: All registered crew members
                  value:
                    - crewId: "CREW-001"
                      fullName: "Erik Lindström"
                      role: "captain"
                      certifications:
                        - "STCW-II/2"
                        - "GMDSS"
                    - crewId: "CREW-002"
                      fullName: "Maria Santos"
                      role: "first_officer"
                      certifications:
                        - "STCW-II/2"
                    - crewId: "CREW-003"
                      fullName: "Aiko Tanaka"
                      role: "cook"
                      certifications:
                        - "STCW-VI/3"
                    - crewId: "CREW-004"
                      fullName: "Hans Mueller"
                      role: "engineer"
                      certifications:
                        - "STCW-III/2"

  /cargo:
    get:
      tags:
        - Cargo
      operationId: list-cargo
      summary: List all cargo items
      description: >-
        Returns a list of all registered cargo items with type, description,
        weight, and hazardous material classification.
      parameters:
        - $ref: '#/components/parameters/RegistryVersion'
      responses:
        '200':
          description: A list of cargo items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CargoItem'
              examples:
                allCargo:
                  summary: All registered cargo items
                  value:
                    - cargoId: "CARGO-2024-0451"
                      type: "container"
                      description: "Electronics components"
                      weight: 12.5
                      hazardous: false
                    - cargoId: "CARGO-2024-0452"
                      type: "bulk"
                      description: "Iron ore samples"
                      weight: 85.0
                      hazardous: false
                    - cargoId: "CARGO-2024-0453"
                      type: "container"
                      description: "Industrial solvents"
                      weight: 5.2
                      hazardous: true

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Bearer token for authenticated access. Without authentication,
        only basic ship summaries are returned. With authentication,
        full details including specs, dimensions, certifications, and
        crew assignments are available.

  parameters:
    RegistryVersion:
      name: Registry-Version
      in: header
      required: false
      description: API version identifier
      schema:
        type: string
      example: "2024-01-01"

  schemas:
    ShipSummary:
      type: object
      description: Basic ship summary returned by list operations
      required:
        - imo_number
        - vessel_name
        - vessel_type
        - flag_code
        - operational_status
      properties:
        imo_number:
          type: string
          description: IMO identification number
          example: "IMO-9321483"
        vessel_name:
          type: string
          description: Name of the vessel
          example: "Northern Star"
        vessel_type:
          type: string
          description: Type of vessel
          enum:
            - cargo
            - tanker
            - bulk_carrier
            - container
            - passenger
          example: "cargo"
        flag_code:
          type: string
          description: ISO country code of the flag state
          example: "NO"
        operational_status:
          type: string
          description: Current operational status
          enum:
            - active
            - maintenance
            - decommissioned
          example: "active"

    ShipDetail:
      type: object
      description: >-
        Full ship details returned by get-ship when authenticated.
        Includes specs, dimensions, and crew assignments beyond the
        basic summary fields.
      required:
        - imo_number
        - vessel_name
        - vessel_type
        - flag_code
        - operational_status
      properties:
        imo_number:
          type: string
          description: IMO identification number
          example: "IMO-9321483"
        vessel_name:
          type: string
          description: Name of the vessel
          example: "Northern Star"
        vessel_type:
          type: string
          description: Type of vessel
          enum:
            - cargo
            - tanker
            - bulk_carrier
            - container
            - passenger
          example: "cargo"
        flag_code:
          type: string
          description: ISO country code of the flag state
          example: "NO"
        operational_status:
          type: string
          description: Current operational status
          enum:
            - active
            - maintenance
            - decommissioned
          example: "active"
        year_built:
          type: integer
          description: Year the vessel was built
          example: 2015
        gross_tonnage:
          type: integer
          description: Gross tonnage of the vessel
          example: 42000
        dimensions:
          type: object
          description: Physical dimensions of the vessel
          properties:
            length_overall:
              type: number
              description: Length overall in meters
              example: 229
            beam:
              type: number
              description: Beam (width) in meters
              example: 32
            draft:
              type: number
              description: Draft in meters
              example: 12.5
        assignedCrew:
          type: array
          description: List of assigned crew member IDs
          items:
            type: string
          example:
            - "CREW-001"
            - "CREW-003"

    CreateVoyageRequest:
      type: object
      description: Request body for creating a new voyage
      required:
        - shipImo
        - departurePort
        - arrivalPort
        - departureDate
        - arrivalDate
        - crewIds
      properties:
        shipImo:
          type: string
          description: IMO number of the ship assigned to the voyage
          example: "IMO-9321483"
        departurePort:
          type: string
          description: Port of departure
          example: "Oslo"
        arrivalPort:
          type: string
          description: Port of arrival
          example: "Singapore"
        departureDate:
          type: string
          format: date
          description: Departure date (ISO-8601)
          example: "2026-04-10"
        arrivalDate:
          type: string
          format: date
          description: Arrival date (ISO-8601)
          example: "2026-05-02"
        crewIds:
          type: array
          description: List of crew member IDs assigned to the voyage
          items:
            type: string
          example:
            - "CREW-001"
            - "CREW-003"
        cargoIds:
          type: array
          description: List of cargo item IDs (optional)
          items:
            type: string
          example:
            - "CARGO-2024-0451"

    Voyage:
      type: object
      description: Full voyage details
      required:
        - voyageId
        - shipImo
        - departurePort
        - arrivalPort
        - departureDate
        - arrivalDate
        - crewIds
        - status
      properties:
        voyageId:
          type: string
          description: Unique voyage identifier
          example: "VOY-2026-042"
        shipImo:
          type: string
          description: IMO number of the assigned ship
          example: "IMO-9321483"
        departurePort:
          type: string
          description: Port of departure
          example: "Oslo"
        arrivalPort:
          type: string
          description: Port of arrival
          example: "Singapore"
        departureDate:
          type: string
          format: date
          description: Departure date (ISO-8601)
          example: "2026-04-10"
        arrivalDate:
          type: string
          format: date
          description: Arrival date (ISO-8601)
          example: "2026-05-02"
        crewIds:
          type: array
          description: List of assigned crew member IDs
          items:
            type: string
          example:
            - "CREW-001"
            - "CREW-003"
        cargoIds:
          type: array
          description: List of assigned cargo item IDs
          items:
            type: string
          example:
            - "CARGO-2024-0451"
        status:
          type: string
          description: Current voyage status
          enum:
            - planned
            - in_progress
            - completed
            - cancelled
          example: "planned"

    CrewMember:
      type: object
      description: Crew member details
      required:
        - crewId
        - fullName
        - role
      properties:
        crewId:
          type: string
          description: Unique crew member identifier
          example: "CREW-001"
        fullName:
          type: string
          description: Full name of the crew member
          example: "Erik Lindström"
        role:
          type: string
          description: Role/position on the vessel
          enum:
            - captain
            - first_officer
            - engineer
            - cook
            - deckhand
            - navigator
          example: "captain"
        certifications:
          type: array
          description: List of professional certifications
          items:
            type: string
          example:
            - "STCW-II/2"
            - "GMDSS"

    CargoItem:
      type: object
      description: Cargo item details
      required:
        - cargoId
        - type
        - description
        - weight
        - hazardous
      properties:
        cargoId:
          type: string
          description: Unique cargo item identifier
          example: "CARGO-2024-0451"
        type:
          type: string
          description: Type of cargo
          enum:
            - container
            - bulk
            - liquid
            - breakbulk
          example: "container"
        description:
          type: string
          description: Description of the cargo contents
          example: "Electronics components"
        weight:
          type: number
          description: Weight in metric tons
          example: 12.5
        hazardous:
          type: boolean
          description: Whether the cargo is classified as hazardous
          example: false

    Error:
      type: object
      description: Error response
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
          example: "not_found"
        message:
          type: string
          description: Human-readable error message
          example: "Resource not found"