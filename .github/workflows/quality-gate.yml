name: Quality Gate

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

jobs:
  test-and-analyze:
    name: Unit Tests + JaCoCo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Init summary
        run: |
          echo "# PR Quality Report — $(date '+%Y-%m-%d %H:%M') UTC" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| JaCoCo | Unit test coverage |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

      - name: Start Microcks
        run: |
          docker run -d \
            -p 8080:8080 \
            quay.io/microcks/microcks-uber:latest  

      - name: Wait for Microcks
        run: |
          sleep 15
          curl -sf http://localhost:8080/api/health || (echo "Microcks failed to start" && exit 1)


      - name: Import OpenAPI specs into Microcks
        run: |
          for file in .github/microcks/*.yaml; do
            echo "Importing $file"
            curl -s -X POST "http://localhost:8080/api/artifact/upload" \
              -F "file=@$file"
          done

      - name: Patch baseUri in capability files
        run: |
          TUTORIAL_DIR="ikanos-engine/src/test/resources/tutorial"

          get_base_uri() {
            case "$1" in
              registry) echo "http://localhost:8080/rest/naftiko-shipyard-maritime-registry-api/1.0.0-alpha2" ;;
              legacy)   echo "http://localhost:8080/rest/naftiko-shipyard-legacy-dockyard-api/1.0.0-alpha2" ;;
              *)        echo "" ;;
            esac
          }

          find "$TUTORIAL_DIR" -name "*.yaml" -o -name "*.yml" | while read file; do
            COUNT=$(yq '.capability.consumes | length' "$file" 2>/dev/null)
            { [ -z "$COUNT" ] || [ "$COUNT" = "0" ] || [ "$COUNT" = "null" ]; } && continue

            for i in $(seq 0 $(($COUNT - 1))); do
              IMPORT=$(yq -r ".capability.consumes[$i].import // \"\"" "$file")

              if [ -n "$IMPORT" ]; then
                # Import-style: patch the referenced shared file
                LOCATION=$(yq -r ".capability.consumes[$i].location" "$file")
                SHARED_FILE="$(dirname "$file")/$LOCATION"

                [ ! -f "$SHARED_FILE" ] && echo "Warning: $SHARED_FILE not found, skipping" && continue

                NAMESPACE=$(yq -r ".consumes[0].namespace" "$SHARED_FILE")
                BASE_URI=$(get_base_uri "$NAMESPACE")
                [ -z "$BASE_URI" ] && continue

                echo "Patching shared file $SHARED_FILE: '$NAMESPACE' → $BASE_URI"
                yq -i ".consumes[0].baseUri = \"$BASE_URI\"" "$SHARED_FILE"
              else
                # Inline-style: patch baseUri directly in the tutorial file
                NAMESPACE=$(yq -r ".capability.consumes[$i].namespace // \"\"" "$file")
                [ -z "$NAMESPACE" ] && continue

                BASE_URI=$(get_base_uri "$NAMESPACE")
                [ -z "$BASE_URI" ] && continue

                echo "Patching $file inline: '$NAMESPACE' → $BASE_URI"
                yq -i ".capability.consumes[$i].baseUri = \"$BASE_URI\"" "$file"
              fi
            done
          done

      - name: Prepare shared path
        run: ln -s ikanos-engine/src/test/resources/tutorial/shared shared

      - name: Run tests + JaCoCo coverage
        run: mvn clean verify --no-transfer-progress

      - name: Publish test failures summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          REPORTS=$(find . -path "*/target/surefire-reports/TEST-*.xml")
          if [ -z "$REPORTS" ]; then
            echo "> No Surefire reports found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          TOTAL=0; FAILURES=0; ERRORS=0; SKIPPED=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            read T FA ER SK < <(
              python3 -c "
          import xml.etree.ElementTree as ET
          import sys

          root = ET.parse(sys.argv[1]).getroot()
          print(
              root.get('tests','0'),
              root.get('failures','0'),
              root.get('errors','0'),
              root.get('skipped','0')
          )
          " "$f" 2>/dev/null
            )

            TOTAL=$((TOTAL + T))
            FAILURES=$((FAILURES + FA))
            ERRORS=$((ERRORS + ER))
            SKIPPED=$((SKIPPED + SK))
          done <<< "$REPORTS"
          PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))

          echo "| Passed | Failed | Errors | Skipped | Total |"  >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|----------|----------|-------|"        >> $GITHUB_STEP_SUMMARY
          echo "| $PASSED  | $FAILURES | $ERRORS  | $SKIPPED | $TOTAL |"     >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $((FAILURES + ERRORS)) -eq 0 ]; then
            echo "All tests passed." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "### Failures & Errors" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import xml.etree.ElementTree as ET
          import os, glob

          reports = glob.glob("**/target/surefire-reports/TEST-*.xml", recursive=True)
          found = 0

          for path in sorted(reports):
              try:
                  root = ET.parse(path).getroot()
              except ET.ParseError:
                  continue

              classname = root.get("name", os.path.basename(path))

              for tc in root.findall("testcase"):
                  for tag in ("failure", "error"):
                      node = tc.find(tag)
                      if node is None:
                          continue
                      found += 1
                      test_name  = tc.get("name", "unknown")
                      error_type = node.get("type", tag)
                      message    = node.get("message", "").strip()
                      body       = (node.text or "").strip()

                      lines = body.splitlines()
                      trimmed = "\n".join(lines[:20])
                      if len(lines) > 20:
                          trimmed += f"\n... ({len(lines)-20} more lines)"

                      print(f"<details>")
                      print(f"<summary><b>[{tag.upper()}]</b> <code>{classname}</code> | <code>{test_name}</code></summary>")
                      print(f"")
                      print(f"**Type:** `{error_type}`  ")
                      if message:
                          print(f"**Message:** {message}  ")
                      print(f"")
                      print(f"```")
                      print(trimmed)
                      print(f"```")
                      print(f"</details>")
                      print(f"")

          if found == 0:
              print("_No detailed failure info found in XML reports._")
          PYEOF

      - name: Publish JaCoCo summary
        if: always()
        run: |
          CSV="ikanos-coverage/target/site/jacoco-aggregate/jacoco.csv"
          {
            echo ""
            echo "## JaCoCo Coverage"
            echo ""
            if [ ! -f "$CSV" ]; then
              echo "> No coverage report found."
            else
              MISSED_LINES=$(tail -n +2 "$CSV" | awk -F',' '{sum+=$8} END {print sum+0}')
              COVERED_LINES=$(tail -n +2 "$CSV" | awk -F',' '{sum+=$9} END {print sum+0}')
              TOTAL=$((MISSED_LINES + COVERED_LINES))
              PCT=$([ "$TOTAL" -gt 0 ] && awk "BEGIN {printf \"%.1f\", ($COVERED_LINES/$TOTAL)*100}" || echo "0.0")
              MISSED_B=$(tail -n +2 "$CSV" | awk -F',' '{sum+=$6} END {print sum+0}')
              COVERED_B=$(tail -n +2 "$CSV" | awk -F',' '{sum+=$7} END {print sum+0}')
              TOTAL_B=$((MISSED_B + COVERED_B))
              PCT_B=$([ "$TOTAL_B" -gt 0 ] && awk "BEGIN {printf \"%.1f\", ($COVERED_B/$TOTAL_B)*100}" || echo "0.0")
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Line Coverage | **${PCT}%** (${COVERED_LINES} / ${TOTAL}) |"
              echo "| Branch Coverage | **${PCT_B}%** (${COVERED_B} / ${TOTAL_B}) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: "ikanos-coverage/target/site/jacoco-aggregate/"
          retention-days: 14
   
      - name: Metrics summary (non-main branches)
        if: github.ref != 'refs/heads/main'
        run: |
          CSV="ikanos-coverage/target/site/jacoco-aggregate/jacoco.csv"

          if [ -f "$CSV" ]; then
            MISSED=$(tail -n +2 "$CSV" | awk -F',' '{sum+=$8} END {print sum+0}')
            COVERED=$(tail -n +2 "$CSV" | awk -F',' '{sum+=$9} END {print sum+0}')
            TOTAL=$((MISSED + COVERED))
            COV_PCT=$([ "$TOTAL" -gt 0 ] && awk "BEGIN {printf \"%.0f\", ($COVERED/$TOTAL)*100}" || echo "0")
          else
            COV_PCT="N/A"
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Metrics (branch)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${COV_PCT}% |" >> $GITHUB_STEP_SUMMARY         

      - name: Publish badges to Gist
        if: github.ref == 'refs/heads/main' && always()
        env:
          GIST_ID: 50bfcb34f6512cbad2dd4f460bfc6526
          GIST_TOKEN: ${{ secrets.GIST_SECRET }}
        run: |
          # Load JaCoCo coverage
          CSV="ikanos-coverage/target/site/jacoco-aggregate/jacoco.csv"
          if [ -f "$CSV" ]; then
            MISSED=$(tail -n +2 "$CSV" | awk -F',' '{sum+=$8} END {print sum+0}')
            COVERED=$(tail -n +2 "$CSV" | awk -F',' '{sum+=$9} END {print sum+0}')
            TOTAL=$((MISSED + COVERED))
            COV_PCT=$([ "$TOTAL" -gt 0 ] && awk "BEGIN {printf \"%.0f\", ($COVERED/$TOTAL)*100}" || echo "0")
            [ "$COV_PCT" -ge 80 ] && COV_COLOR="brightgreen" \
              || { [ "$COV_PCT" -ge 50 ] && COV_COLOR="yellow" || COV_COLOR="red"; }
          else
            COV_PCT="N/A"; COV_COLOR="lightgrey"
          fi

          publish_badge() {
            local filename="$1" label="$2" message="$3" color="$4"
            local payload="{\"files\":{\"${filename}\":{\"content\":\"{\\\"schemaVersion\\\":1,\\\"label\\\":\\\"${label}\\\",\\\"message\\\":\\\"${message}\\\",\\\"color\\\":\\\"${color}\\\"}\"}}}"
            curl -s -X PATCH \
              -H "Authorization: token ${GIST_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.github.com/gists/${GIST_ID}" \
              -d "$payload" > /dev/null
            echo "Published: $filename → $message ($color)"
          }

          publish_badge "framework-coverage.json"     "coverage"      "${COV_PCT}%"   "$COV_COLOR"