name: Synchronize Schema and Rules

on:
  push:
    branches:
      - main
    paths:
      - 'ikanos-spec/src/main/resources/schemas/ikanos-schema.json'
      - 'ikanos-spec/src/main/resources/rules/ikanos-rules.yml'
      - 'ikanos-spec/src/main/resources/rules/functions/**'
  workflow_dispatch:

jobs:
  # Synchronize schema and rules to vscode repository.
  sync-to-vscode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout framework
        uses: actions/checkout@v4
        with:
          path: framework

      - name: Checkout vscode
        uses: actions/checkout@v4
        with:
          repository: naftiko/vscode
          token: ${{ secrets.VSCODE_CONTENTS_WRITE_PR_WRITE }}
          path: vscode

      - name: Copy schema and rules
        run: |
          cp ikanos-spec/src/main/resources/schemas/ikanos-schema.json \
             vscode/extensions/naftiko-vscode/src/resources/schemas/ikanos-schema.json

          rm -rf vscode/extensions/naftiko-vscode/src/resources/rules/*
          cp -R ikanos-spec/src/main/resources/rules/* \
               vscode/extensions/naftiko-vscode/src/resources/rules/

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.VSCODE_CONTENTS_WRITE_PR_WRITE }}
          path: vscode
          base: main
          branch: chore/schema-and-rules
          commit-message: "chore: update schema and rules from framework"
          title: "chore: update schema and rules from framework"
          body: |
            Automated sync from [framework@${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            Updated files:
            - `ikanos-schema.json`
            - `rules/*`
          delete-branch: true

  # Synchronize schema to schema-viewer repository.
  sync-to-schema-viewer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout framework
        uses: actions/checkout@v4
        with:
          path: framework

      - name: Checkout schema-viewer
        uses: actions/checkout@v4
        with:
          repository: naftiko/schema-viewer
          token: ${{ secrets.SCHEMA_VIEWER_CONTENTS_WRITE_PR_WRITE }}
          path: schema-viewer

      - name: Copy schema
        run: |
          cp ikanos-spec/src/main/resources/schemas/ikanos-schema.json \
             schema-viewer/src/schemas/ikanos-schema.json

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SCHEMA_VIEWER_CONTENTS_WRITE_PR_WRITE }}
          path: schema-viewer
          base: main
          branch: chore/schema
          commit-message: "chore: update schema from framework"
          title: "chore: update schema from framework"
          body: |
            Automated sync from [framework@${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            Updated files:
            - `ikanos-schema.json`
          delete-branch: true
