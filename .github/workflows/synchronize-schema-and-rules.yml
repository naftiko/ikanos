name: Synchronize Schema and Rules

on:
  push:
    branches:
      - main
    paths:
      - 'modules/ikanos-spec/src/main/resources/schemas/ikanos-schema.json'
      - 'modules/ikanos-spec/src/main/resources/rules/ikanos-rules.yml'
      - 'modules/ikanos-spec/src/main/resources/rules/functions/**'
  workflow_dispatch:

jobs:
  # Synchronize schema and rules to crafter repository.
  sync-to-crafter:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_SYNC_IKANOS_VERSION_ID }}
          private-key: ${{ secrets.APP_SYNC_IKANOS_VERSION_PRIVATE_KEY }}
          owner: naftiko
          repositories: crafter

      - name: Checkout ikanos
        uses: actions/checkout@v7
        with:
          path: ikanos

      - name: Checkout crafter
        uses: actions/checkout@v7
        with:
          repository: naftiko/crafter
          token: ${{ steps.app-token.outputs.token }}
          path: crafter

      - name: Copy schema and rules
        run: |
          cp ikanos/modules/ikanos-spec/src/main/resources/schemas/ikanos-schema.json \
             crafter/extensions/naftiko-crafter/src/formats/ikanos/schemas/ikanos-schema.json

          rm -rf crafter/extensions/naftiko-crafter/src/formats/ikanos/rules/*
          cp -R ikanos/modules/ikanos-spec/src/main/resources/rules/* \
               crafter/extensions/naftiko-crafter/src/formats/ikanos/rules/

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: crafter
          base: main
          branch: chore/schema-and-rules
          commit-message: "chore: update schema and rules from ikanos"
          title: "chore: update schema and rules from ikanos"
          body: |
            Automated sync from [ikanos@${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            Updated files:
            - `formats/ikanos/schemas/ikanos-schema.json`
            - `formats/ikanos/rules/*`
          delete-branch: true

  # Synchronize schema to schema-viewer repository.
  sync-to-schema-viewer:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_SYNC_IKANOS_VERSION_ID }}
          private-key: ${{ secrets.APP_SYNC_IKANOS_VERSION_PRIVATE_KEY }}
          owner: naftiko
          repositories: schema-viewer

      - name: Checkout ikanos
        uses: actions/checkout@v7
        with:
          path: ikanos

      - name: Checkout schema-viewer
        uses: actions/checkout@v7
        with:
          repository: naftiko/schema-viewer
          token: ${{ steps.app-token.outputs.token }}
          path: schema-viewer

      - name: Copy schema
        run: |
          cp ikanos/modules/ikanos-spec/src/main/resources/schemas/ikanos-schema.json \
             schema-viewer/src/schemas/ikanos-schema.json

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: schema-viewer
          base: main
          branch: chore/schema
          commit-message: "chore: update schema from ikanos"
          title: "chore: update schema from ikanos"
          body: |
            Automated sync from [ikanos@${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            Updated files:
            - `ikanos-schema.json`
          delete-branch: true
