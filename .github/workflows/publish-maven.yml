name: Publish Maven to sonatype and GitHub Packages

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')    
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
      
      - name: Prepare shared path
        run: ln -s ikanos-engine/src/test/resources/tutorial/shared shared

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Start Microcks
        run: docker run -d -p 8080:8080 quay.io/microcks/microcks-uber:latest

      - name: Wait for Microcks
        run: |
          sleep 15
          curl -sf http://localhost:8080/api/health || (echo "Microcks failed to start" && exit 1)

      - name: Import OpenAPI specs into Microcks
        run: |
          for file in .github/microcks/*.yaml; do
            echo "Importing $file"
            curl -s -X POST "http://localhost:8080/api/artifact/upload" -F "file=@$file"
          done

      - name: Publish to GitHub Packages (release)
        run: mvn --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  maven-central:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Prepare shared path
        run: ln -s ikanos-engine/src/test/resources/tutorial/shared shared

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Microcks
        run: docker run -d -p 8080:8080 quay.io/microcks/microcks-uber:latest

      - name: Wait for Microcks
        run: |
          sleep 15
          curl -sf http://localhost:8080/api/health || (echo "Microcks failed to start" && exit 1)

      - name: Import OpenAPI specs into Microcks
        run: |
          for file in .github/microcks/*.yaml; do
            echo "Importing $file"
            curl -s -X POST "http://localhost:8080/api/artifact/upload" -F "file=@$file"
          done

      - name: Configure Maven Central
        run: bash ./scripts/builder.sh config_maven_central
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}

      - name: Configure GPG
        run: bash ./scripts/builder.sh config_gpg
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish to Maven Central
        run: bash ./scripts/builder.sh central
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_OPTS: "-Dcentral.publishing.waitUntil=validated"

      - name: Cleanup
        if: always()
        run: |
          rm -rf ~/.gnupg
          rm -f ~/.m2/settings.xml


  github-snapshot:
    if: github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Prepare shared path
        run: ln -s ikanos-engine/src/test/resources/tutorial/shared shared
        
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Start Microcks
        run: docker run -d -p 8080:8080 quay.io/microcks/microcks-uber:latest

      - name: Wait for Microcks
        run: |
          sleep 15
          curl -sf http://localhost:8080/api/health || (echo "Microcks failed to start" && exit 1)

      - name: Import OpenAPI specs into Microcks
        run: |
          for file in .github/microcks/*.yaml; do
            echo "Importing $file"
            curl -s -X POST "http://localhost:8080/api/artifact/upload" -F "file=@$file"
          done

      - name: Get version
        run: echo "VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_ENV

      - name: Publish snapshot
        if: contains(env.VERSION, 'SNAPSHOT')
        run: mvn --batch-mode -Dgpg.skip=true deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
