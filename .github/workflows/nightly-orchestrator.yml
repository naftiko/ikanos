name: Nightly Trigger

on:
  push:
    branches:
      - 'feat/nightly-tests'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  trigger:
    name: Trigger nightly on all open PRs 
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch nightly on each branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCHES=$(gh api repos/${{ github.repository }}/pulls \
            --jq '[.[] | .head.ref] | unique | .[]')

          for BRANCH in $BRANCHES; do
            echo "Dispatching nightly on branch: $BRANCH"
            gh api repos/${{ github.repository }}/actions/workflows/nightly-quality-gate.yml/dispatches \
              -f ref="$BRANCH"
          done