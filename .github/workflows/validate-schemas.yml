name: Validate Examples Against Schema

on:
  push:
    paths:
      - 'src/main/resources/schemas/**'
      - 'src/test/resources/**'
  pull_request:
    paths:
      - 'src/main/resources/schemas/**'
      - 'src/test/resources/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .github
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: '.github/package-lock.json'

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Validate YAML examples
        working-directory: ${{ github.workspace }}
        run: |
          PATHS=(
            "src/main/resources/schemas/tutorial"
            "src/main/resources/schemas/examples"
            "src/test/resources"
          )
          
          for dir in "${PATHS[@]}"; do
            for file in "$dir"/*.{yaml,yml}; do
              [ -f "$file" ] || continue
              echo "Validating $file..."
              npx --prefix .github ajv validate -s src/main/resources/schemas/capability-schema.json -d "$file" --spec=draft2020 --strict-schema=false
            done
          done
          
