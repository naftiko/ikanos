name: Synchronize Ikanos Version in Repository

on:
  workflow_dispatch:

jobs:
  # This job is only executed when the action is manually launched on a branch other than 'main'.
  sync-ikanos-version:
    runs-on: ubuntu-latest
    if: github.ref_name != 'main'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_SYNC_IKANOS_VERSION_ID }}
          private-key: ${{ secrets.APP_SYNC_IKANOS_VERSION_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run version sync script
        run: |
          python3 scripts/sync-ikanos-version.py

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          base: ${{ github.ref_name }}
          branch: "chore/sync-ikanos-version"
          commit-message: "chore: sync Ikanos version from pom.xml"
          title: "chore: sync Ikanos version"
          body: |
            ## No related issue

            ---

            ## What does this PR do?

            Automatically synchronizes the Ikanos version across the repository:
            - Updates `ikanos` version in YAML files
            - Updates `const` in JSON schema
            - Updates `$id` schema URL

            Source of truth: `pom.xml`

            ---

            ## Tests

            No additional tests required.
            This change is limited to version synchronization and does not impact runtime behavior.

            ---

            ## Checklist

            - [ ] CI is green (build, tests, schema validation, security scans)
            - [ ] Rebased on latest `main`
            - [ ] Small and focused — one concern per PR
            - [ ] Commit messages follow [Conventional Commits](https://www.conventionalcommits.org/)
          delete-branch: true
