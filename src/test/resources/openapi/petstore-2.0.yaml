swagger: "2.0"
info:
  title: "Petstore"
  description: "A sample API that uses a petstore as an example"
  version: "1.0.0"
host: "petstore.swagger.io"
basePath: "/v1"
schemes:
  - "https"
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags:
        - Pets
      parameters:
        - name: limit
          in: query
          required: false
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: A list of pets
          schema:
            type: array
            items:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
                tag:
                  type: string
    post:
      operationId: createPet
      summary: Create a pet
      tags:
        - Pets
      consumes:
        - application/json
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - name
            properties:
              name:
                type: string
              tag:
                type: string
      responses:
        "201":
          description: Pet created
  /pets/{petId}:
    get:
      operationId: showPetById
      summary: Info for a specific pet
      tags:
        - Pets
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: Expected response to a valid request
          schema:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              tag:
                type: string
    delete:
      operationId: deletePet
      summary: Delete a pet
      tags:
        - Pets
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
      responses:
        "204":
          description: Pet deleted
