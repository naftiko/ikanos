# yaml-language-server: $schema=../../main/resources/schemas/naftiko-schema.json
---
naftiko: "1.0.0-alpha2"
info:
  label: "Control Port Test Capability"
  description: "Test capability for Control Server Adapter deserialization and wiring"
  tags:
    - Test
    - Control
  created: "2026-06-01"
  modified: "2026-06-01"

capability:
  exposes:
    - type: "control"
      address: "localhost"
      port: 9199
      endpoints:
        health: true
        metrics: true
        info: true
        traces:
          enabled: true
          buffer-size: 50
