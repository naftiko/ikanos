# yaml-language-server: $schema=../../main/resources/schemas/naftiko-schema.json
---
naftiko: "1.0.0-alpha2"

capability:
  consumes:
    - namespace: registry
      type: http
      baseUri: "http://localhost:19999"
      resources:
        - name: ship
          path: "/ships/{{imo_number}}"
          operations:
            - name: get-ship
              method: GET
              inputParameters:
                - name: imo_number
                  in: path

  exposes:
    - type: mcp
      port: 13001
      namespace: shipyard-tools
      description: "Test MCP tools for ToolHandler regression tests"
      tools:
        - name: get-ship
          description: "Get a ship by IMO number"
          inputParameters:
            - name: imo
              type: string
              description: "IMO number of the ship"
              required: true
          call: registry.get-ship
          with:
            imo_number: "{{imo}}"
