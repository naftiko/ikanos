# yaml-language-server: $schema=../../main/resources/schemas/naftiko-schema.json
---
naftiko: "0.5"
capability:
  exposes:
    - type: "rest"
      address: "localhost"
      port: 8084
      namespace: "test-http-body"
      resources:
        - path: "/users"
          operations:
            - method: "POST"
              name: "create-user"
              call: "testns.create"
              inputParameters:
                - name: "userId"
                  in: "body"
                  type: "string"
                  description: "User ID extracted from request body"
                  value: "$.user.id"
                - name: "userName"
                  in: "body"
                  type: "string"
                  description: "User name extracted from request body"
                  value: "$.user.name"
  consumes:
    - type: "http"
      namespace: "testns"
      baseUri: "http://example.com"
      resources:
        - path: "/create"
          name: "create"
          operations:
            - method: "POST"
              name: "create"
              body: |
                {"id":"{{userId}}","name":"{{userName}}"}
