naftiko: "1.0.0-alpha1"
consumes:
  - namespace: legacy
    type: http
    baseUri: "http://localhost:8585/rest/naftiko-shipyard-legacy-dockyard-api/1.0.0-alpha1"
    authentication:
      type: apikey
      key: X-Dock-Key
      placement: header
      value: "DOCKYARD_API_KEY"
    resources:
      - name: vessels
        path: "/vessels"
        operations:
          - name: list-vessels
            method: GET
            inputParameters:
              - name: status
                in: query
