# yaml-language-server: $schema=../naftiko-schema.json
---
naftiko: "1.0.0-alpha2"
info:
  label: "Script Step Examples"
  description: >
    Demonstrates the script step feature with JavaScript and Python.
    Fetches data from APIs and uses script steps for data transformation.
  tags:
    - Script
    - JavaScript
    - Python
    - Example
  created: "2026-04-21"
  modified: "2026-04-21"

capability:
  exposes:
    - type: control
      address: localhost
      port: 9090
      management:
        health: true
        scripting:
          enabled: true
          defaultLocation: "file:///app/capabilities/scripts"
          defaultLanguage: javascript
          timeout: 3000
          statementLimit: 50000
          allowedLanguages:
            - javascript
            - python

    - type: mcp
      address: localhost
      port: 3000
      namespace: reporting
      tools:
        - name: active-members
          description: "Returns active GitHub organization members"
          inputParameters:
            - name: org
              type: string
              description: "GitHub organization name"
              required: true
          steps:
            - type: call
              name: list-members
              call: github.list-org-members
              with:
                org: "{{org}}"

            - type: script
              name: filter-active
              language: javascript
              location: "file:///app/capabilities/scripts"
              file: "filter-active.js"
              dependencies:
                - "lib/array-utils.js"
          mappings:
            - targetName: active-members
              value: "$.filter-active"
          outputParameters:
            - name: active-members
              type: array
              items:
                - name: login
                  type: string
                - name: id
                  type: number

        - name: readings-summary
          description: "Analyzes sensor readings and returns statistics"
          inputParameters:
            - name: device-id
              type: string
              description: "Sensor device identifier"
              required: true
          steps:
            - type: call
              name: fetch-readings
              call: sensors.get-readings
              with:
                device-id: "{{device-id}}"

            - type: script
              name: analyze
              language: python
              location: "file:///app/capabilities/scripts"
              file: "analyze-readings.py"
          mappings:
            - targetName: average
              value: "$.analyze.average"
            - targetName: min
              value: "$.analyze.min"
            - targetName: max
              value: "$.analyze.max"
            - targetName: count
              value: "$.analyze.count"
          outputParameters:
            - name: average
              type: number
            - name: min
              type: number
            - name: max
              type: number
            - name: count
              type: number

  consumes:
    - type: http
      namespace: github
      baseUri: "https://api.github.com"
      resources:
        - path: "/orgs/{{org}}/members"
          name: members
          operations:
            - method: GET
              name: list-org-members

    - type: http
      namespace: sensors
      baseUri: "https://api.sensors.example.com"
      resources:
        - path: "/devices/{{device-id}}/readings"
          name: readings
          operations:
            - method: GET
              name: get-readings
