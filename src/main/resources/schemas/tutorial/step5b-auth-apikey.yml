# yaml-language-server: $schema=../capability-schema.json
---
naftiko: "0.4"
info:
  label: "Tutorial - Step 5b - API Server Authentication (API Key)"
  description: "This sample demonstrates server-side API key authentication on an exposed API adapter."
  tags:
    - Naftiko
    - Tutorial
    - Authentication
  created: "2026-03-04"
  modified: "2026-03-04"
  stakeholders:
    - role: "editor"
      fullName: "Navi"
      email: "navi@naftiko.io"

externalRefs:
  - name: "api-auth"
    type: "variables"
    description: "Runtime variables for API key authentication. Set NAFTIKO_API_KEY environment variable before running this capability."
    resolution: "runtime"
    keys:
      naftiko_api_key: "NAFTIKO_API_KEY"

capability:
  exposes:
    - type: "api"
      address: "localhost"
      port: 9090
      namespace: "tutorial"
      authentication:
        type: "apikey"
        key: "X-API-Key"
        value: "{{naftiko_api_key}}"
        placement: "header"
      resources:
        - path: "/hello"
          name: "hello"
          label: "Protected hello"
          description: "Simple protected endpoint requiring API key"
          operations:
            - method: "GET"
              outputParameters:
                - type: "string"
                  const: "Hello, Authenticated World!"