---
naftiko: "1.0.0-alpha1"

binds:
  - namespace: "registry-env"
    description: "Maritime Registry API credentials and config."
    location: "file:///./secrets.yaml"
    keys:
      REGISTRY_TOKEN: "registry-bearer-token"
      REGISTRY_VERSION: "registry-api-version"
  - namespace: "dockyard-env"
    description: "Legacy Dockyard API credentials."
    location: "file:///./secrets.yaml"
    keys:
      DOCKYARD_API_KEY: "dockyard-api-key"

capability:
  consumes:
    - import: registry
      location: ./shared/registry-consumes.yaml
    - import: legacy
      location: ./shared/legacy-consumes.yaml

  exposes:
    - type: mcp
      port: 3001
      namespace: shipyard-tools
      description: "Shipyard MCP tools for fleet management"
      tools:
        - name: list-ships
          description: "List ships in the shipyard, optionally filtered by status"
          inputParameters:
            - name: status
              type: string
              required: false
              description: "Filter by operational status"
          call: registry.list-ships
          with:
            status: shipyard-tools.status
          outputParameters:
            - type: array
              mapping: "$."
              items:
                type: object
                properties:
                    imo:
                      type: string
                      mapping: "$.imo_number"
                    name:
                      type: string
                      mapping: "$.vessel_name"
                    type:
                      type: string
                      mapping: "$.vessel_type"
                    flag:
                      type: string
                      mapping: "$.flag_code"
                    status:
                      type: string
                      mapping: "$.operational_status"
        - name: get-ship
          description: "Retrieve a ship's details by IMO number"
          inputParameters:
            - name: imo
              type: string
              required: true
              description: "IMO number of the ship"
          call: registry.get-ship
          with:
            imo_number: shipyard-tools.imo
          outputParameters:
            - type: object
              properties:
                imo:
                  type: string
                  mapping: "$.imo_number"
                name:
                  type: string
                  mapping: "$.vessel_name"
                type:
                  type: string
                  mapping: "$.vessel_type"
                flag:
                  type: string
                  mapping: "$.flag_code"
                status:
                  type: string
                  mapping: "$.operational_status"
                specs:
                  type: object
                  properties:
                    yearBuilt:
                      type: number
                      mapping: "$.year_built"
                    tonnage:
                      type: number
                      mapping: "$.gross_tonnage"
                    length:
                      type: number
                      mapping: "$.dimensions.length_overall"
        - name: list-legacy-vessels
          description: "List vessels from the legacy Dockyard, optionally filtered by status"
          inputParameters:
            - name: status
              type: string
              required: false
              description: "Filter by operational status (active, laid_up, scrapped)"
          call: legacy.list-vessels
          with:
            status: shipyard-tools.status
          outputParameters:
            - type: array
              mapping: "$."
              items:
                type: object
                properties:
                    vesselCode:
                      type: string
                      mapping: "$.vesselCode"
                    name:
                      type: string
                      mapping: "$.vesselName"
                    type:
                      type: string
                      mapping: "$.category"
                    flag:
                      type: string
                      mapping: "$.flagState"
                    status:
                      type: string
                      mapping: "$.operationalStatus"
