# yaml-language-server: $schema=../naftiko-schema.json
---
naftiko: "0.5"
info:
  label: "Tutorial - Step 5a - API Server Authentication (Bearer)"
  description: "This sample demonstrates server-side bearer token authentication on an exposed API adapter."
  tags:
    - Naftiko
    - Tutorial
    - Authentication
  created: "2026-03-04"
  modified: "2026-03-04"
  stakeholders:
    - role: "editor"
      fullName: "Navi"
      email: "navi@naftiko.io"

externalRefs:
  - name: "api-auth"
    type: "variables"
    description: "Runtime variables for API bearer token authentication. Set NAFTIKO_API_TOKEN environment variable before running this capability."
    resolution: "runtime"
    keys:
      naftiko_api_token: "NAFTIKO_API_TOKEN"

capability:
  exposes:
    - type: "api"
      address: "localhost"
      port: 9090
      namespace: "tutorial"
      authentication:
        type: "bearer"
        token: "{{naftiko_api_token}}"
      resources:
        - path: "/hello"
          name: "hello"
          label: "Protected hello"
          description: "Simple protected endpoint requiring bearer token"
          operations:
            - method: "GET"
              outputParameters:
                - type: "string"
                  const: "Hello, Authenticated World!"