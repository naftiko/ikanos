# yaml-language-server: $schema=../capability-schema.json
---
naftiko: "0.4"
info:
  label: "Tutorial - Step 4a - Structured API resource"
  description: "This is a sample capability specification to demonstrate the features of Naftiko"
  tags:
    - Naftiko
    - Tutorial
  created: "2026-02-26"
  modified: "2026-02-26"
  stakeholders:
    - role: "editor"
      fullName: "Navi"
      email: "navi@naftiko.io"

capability:
  exposes:
    - type: "api"
      address: "localhost"
      port: 9090
      namespace: "sample"
      resources:
        - path: "/notion/pre-release"
          name: "pr"
          label: "Pre-release resource"
          description: "This is a resource to retrieve the list of pre-release participants stored in Notion"
          operations:
            - method: "GET"
              steps:
                - name: "fetch-committed-participants"
                  type: call
                  call: "notion.query-db"
                  with:
                    datasource_id: "2fe4adce-3d02-8028-bec8-000bfb5cafa2"
        - path: "/notion/{{path}}"
          description: "This resource forwards requests to the Notion API, allowing access to any Notion endpoint by specifying the path parameter. For example, a request to /notion/pages would be forwarded to https://api.notion.com/v1/pages."
          forward:
            targetNamespace: notion
            trustedHeaders:
            - Notion-Version

  consumes:
    - type: "http"
      description: "Forwarded requests from the /notion/{path} resource, to be sent to the Notion API"
      namespace: "notion"
      baseUri: "https://api.notion.com/v1/"
      authentication:
        type: "bearer"
        token: "{{notion_api_key}}"
      inputParameters:
        - name: "notion_api_key"
          in: "environment"
        - name: "Notion-Version"
          in: "header"
          value: "2025-09-03"
      resources:
        - path: "data_sources/{{datasource_id}}/query"
          name: "query"
          label: "Query database resource"
          operations:
            - method: "POST"
              name: "query-db"
              label: "Query Database"
              body: |
                {
                  "filter": {
                    "property": "Participation Status",
                    "select": {
                      "equals": "Committed"
                    }
                  }
                }
