version: '3.8'

services:
  naftiko-capability:
    # Build the image from the Dockerfile in the current directory
    build: .
    image: naftiko-capability:latest
    
    # Mount the local file into the container
    volumes:
      - ./naftiko.yaml:/data/mounted-naftiko.yaml
    
    # Override the default command arguments
    # We pass the runtime subcommand and the mounted file to the CLI jar
    command: ["serve", "/data/mounted-naftiko.yaml"]
    